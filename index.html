<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Card</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <section data-testid="test-todo-card" class="card">
      <div>
        <h3 data-testid="test-todo-title">Finish My Assignment
          <input type="checkbox" data-testid="test-todo-complete-toggle" aria-label="">
        </h3> 
      </div>
          <p data-testid="test-todo-description">
            Complete my portfolio website and deploy it.
          </p>
          <span data-testid="test-todo-priority" class="priority high">High</span>
          <div class="badge">
          <p data-testid="test-todo-due-date" id="dueDate">Due: Apr 16, 2026</p>
          <p data-testid="test-todo-time-remaining" id="timeRemaining">Due in 1 week</p>
          <p data-testid="test-todo-status">In progress..</p>
        </div>
          <div data-testid="test-todo-tags" class="tags">
            <span class="tag" data-testid="test-todo-tag-work">Work</span>
            <span class="tag" data-testid="test-todo-tag-urgent">Urgent</span>
          </div>
          <div class="buttons" data-testid="test-todo-button">
            <button class="edit" data-testid="test-todo-edit-button">Edit</button>
            <button class="delete" data-testid="test-todo-delete-button">Delete</button>
        </div>
          </section>


    <script src="todo.js"></script>
</body>
</html>
